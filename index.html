<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzería La Italiana</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1f1814;
  color:#efe3d6;
}

.container{padding:20px;max-width:900px;margin:auto;}

h2{
  border-bottom:1px solid rgba(255,255,255,.1);
  padding-bottom:8px;
}

.item{
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.btn{
  margin-top:6px;
  padding:8px 12px;
  border:none;
  border-radius:999px;
  cursor:pointer;
}

.add{background:#d4b183;color:#000;}
.custom{border:1px solid #d4b183;background:transparent;color:#d4b183;}

#cartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4b183;
  padding:14px;
  border-radius:50%;
}

#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#2a201b;
  padding:20px;
  transition:.3s;
}

#cartPanel.open{right:0;}
</style>
</head>

<body>

<div class="container" id="menu"></div>

<div id="cartBtn" onclick="toggleCart()">🛒</div>

<div id="cartPanel">
<h3>Pedido</h3>
<div id="cartItems"></div>
<p>Total: <span id="cartTotal">0€</span></p>
<button onclick="sendOrder()">Enviar pedido</button>
</div>

<script>

/* 🔥 TODA TU CARTA REAL */
const MENU = {
"Pizzas":[
["Calzone",11.20],["Sencilla",7.90],["Margarita",8.50],["Bianca",11.20],
["Sorrento",10.90],["Savoia",10.70],["Cuatro Estaciones",11.80],
["Cuatro Quesos",10.70],["Roquefort",10.30],["Gorgonzola",10.90],
["Capriccio",10.70],["Napoletana",10.70],["Marinera",13.00],
["Terranova",13.50],["Salmón",13.00],["Bolognesa",11.20],
["Boscaiola",11.20],["Toscana",11.90],["Capri",11.20],
["Mexicana (picante)",11.90],["Americana",10.90],
["Chorizo Picante (picante)",10.90],["Campesina",10.90],
["Frankfurt",8.50],["Mallorquina",10.90],["Sobrasada",11.20],
["Vegetal",10.70],["De la Casa",11.90],["Funghi",10.50],
["Tropical",10.90],["Bambini",9.50],["Queso de Cabra",10.90],
["Barbacoa",11.90],["Curry",11.70],["Rúcula",11.90],
["Fiorentina",12.00],["Contadina",10.90],["Milanese",11.90],
["Diavola (picante)",12.00],["Veneciana",12.00],
["Seis Quesos",11.50],["Pollo",11.70],
["Griega",14.50],["Stromboli",13.90],
["Pizzaiola",14.50],["Livorno",11.70]
],

"Entrantes":[
["Aceitunas",2.50],["Pan con allioli",4.00],["Patatas fritas",5.50],
["Patatas bravas",7.50],["Patatas roquefort",8.00],
["Patatas gratinadas",9.00],["Patatas cheddar bacon",8.50],
["Antipasto",12.00],["Calamares",9.00],
["Fingers pollo",9.50],["Brie mermelada",8.50],
["Verdura tempura",7.50],["Huevos rotos jamón",10.50],
["Sepia",9.50],["Pulpo",16.50]
],

"Ensaladas":[
["Ensalada pollo",9.00],["Ensalada manzana",9.00],
["Ensalada verde",7.00],["Ensalada mixta",8.50],
["Caprese",9.00],["Queso cabra",10.50],
["Foie",13.50]
],

"Postres":[
["Tiramisú",5.50],["Tarta queso",5.50],
["Tarta 3 chocolates",5.50],["Crep Nutella",5.50],
["Crep dulce leche",5.50],["Coulant chocolate",5.50]
]
};

/* 🔥 GENERAR CARTA */
const menuDiv=document.getElementById("menu");

for(let cat in MENU){
  let html=`<h2>${cat}</h2>`;
  MENU[cat].forEach(p=>{
    html+=`
    <div class="item">
      ${p[0]} · ${p[1]}€
      <br>
      <button class="btn add" onclick="addToCart('${p[0]}',${p[1]})">Añadir</button>
      ${cat==="Pizzas" ? `<button class="btn custom" onclick="addToCart('${p[0]} personalizada',${p[1]})">Personalizar</button>`:""}
    </div>`;
  });
  menuDiv.innerHTML+=html;
}

/* 🛒 CARRITO */
let cart=[];
function addToCart(n,p){
  let f=cart.find(i=>i.name==n);
  f?f.qty++:cart.push({name:n,price:p,qty:1});
  render();
  toggleCart();
}

function render(){
  let h='',t=0;
  cart.forEach(i=>{
    t+=i.price*i.qty;
    h+=i.qty+' x '+i.name+'<br>';
  });
  cartItems.innerHTML=h;
  cartTotal.innerText=t.toFixed(2)+'€';
}

function toggleCart(){
  cartPanel.classList.toggle("open");
}

/* 📲 WHATSAPP */
function sendOrder(){
  let msg='Pedido:%0A';
  cart.forEach(i=>{
    msg+=i.qty+' x '+i.name+'%0A';
  });
  msg+='Total:'+cartTotal.innerText;
  window.open('https://wa.me/34621492566?text='+msg);
}
</script>

</body>
</html>
