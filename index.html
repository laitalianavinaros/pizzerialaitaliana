<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzería La Italiana Vinaròs</title>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#1f1814;
  color:#efe3d6;
}

/* FONDO PREMIUM */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at bottom, rgba(255,120,40,.25), transparent),
    linear-gradient(180deg,#1f1814,#2a201b);
  animation:fuego 6s infinite alternate;
  z-index:-1;
}

@keyframes fuego{
  from{opacity:.7}
  to{opacity:1}
}

/* HEADER */
.header{
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:600;
}

/* SECCIONES */
.section{
  padding:20px;
}

.section h2{
  border-bottom:1px solid #333;
  padding-bottom:10px;
}

/* PRODUCTOS */
.product{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.product-name{
  font-weight:600;
}

.product-actions{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.btn{
  flex:1;
  padding:10px;
  border-radius:999px;
  border:none;
  cursor:pointer;
}

.add{background:#d4b183;color:#000;}
.custom{border:1px solid #d4b183;background:transparent;color:#d4b183;}

/* CARRITO */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#2a201b;
  padding:20px;
  overflow:auto;
  border-left:1px solid rgba(255,255,255,.1);
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#2b211c;
  padding:20px;
  border-radius:16px;
}

.chip{
  padding:6px 10px;
  border:1px solid #555;
  margin:4px;
  border-radius:999px;
  display:inline-block;
  cursor:pointer;
}

.removed{background:#7a2b2b;text-decoration:line-through;}
.active{background:#d4b183;color:#000;}
</style>
</head>

<body>

<div class="header">
Pizzería La Italiana · Desde 1982  
<br>📞 964 82 84 91 · 621 49 25 66
</div>

<div class="section">

<h2>🍕 Pizzas</h2>

<div class="product">
<div class="product-name">Barbacoa · 11,90€</div>
<div class="product-actions">
<button class="btn add" onclick="addToCart('Pizza Barbacoa',11.9)">Añadir</button>
<button class="btn custom" onclick="openCustomizer('Pizza Barbacoa',11.9)">Personalizar</button>
</div>
</div>

<div class="product">
<div class="product-name">Mexicana (picante) · 11,90€</div>
<div class="product-actions">
<button class="btn add" onclick="addToCart('Pizza Mexicana',11.9)">Añadir</button>
<button class="btn custom" onclick="openCustomizer('Pizza Mexicana',11.9)">Personalizar</button>
</div>
</div>

<div class="product">
<div class="product-name">Diavola (picante) · 12,00€</div>
<div class="product-actions">
<button class="btn add" onclick="addToCart('Pizza Diavola',12)">Añadir</button>
<button class="btn custom" onclick="openCustomizer('Pizza Diavola',12)">Personalizar</button>
</div>
</div>

<h2>🍝 Entrantes</h2>

<div class="product">
<div class="product-name">Patatas bravas · 7,50€</div>
<button class="btn add" onclick="addToCart('Patatas bravas',7.5)">Añadir</button>
</div>

<div class="product">
<div class="product-name">Calamares · 9,00€</div>
<button class="btn add" onclick="addToCart('Calamares',9)">Añadir</button>
</div>

<h2>🍰 Postres</h2>

<div class="product">
<div class="product-name">Tiramisú · 5,50€</div>
<button class="btn add" onclick="addToCart('Tiramisú',5.5)">Añadir</button>
</div>

<div class="product">
<div class="product-name">Tarta de queso · 5,50€</div>
<button class="btn add" onclick="addToCart('Tarta de queso',5.5)">Añadir</button>
</div>

</div>

<!-- CARRITO -->
<div class="cart">
<h3>🧾 Tu pedido</h3>
<div id="cart"></div>
<p>Total: <span id="total">0€</span></p>

<input id="name" placeholder="Nombre">
<input id="phone" placeholder="Teléfono">
<input id="address" placeholder="Dirección (si domicilio)">
<textarea id="notes" placeholder="Notas"></textarea>

<button onclick="sendOrder()">Enviar por WhatsApp</button>
</div>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<h3 id="title"></h3>

<div id="ingredients"></div>
<div id="extras"></div>

<input id="notesPizza" placeholder="Notas">

<button onclick="addCustom()">Añadir</button>
<button onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>
let cart=[],current=null,removed=[],extras=[];

const pizzaData={
"Pizza Barbacoa":["Tomate","Carne","Bacon","BBQ","Mozzarella"],
"Pizza Mexicana":["Carne","Maíz","Cebolla","Picante"],
"Pizza Diavola":["Tomate","Mozzarella","Chorizo picante"]
};

function addToCart(n,p){
let f=cart.find(i=>i.name==n);
f?f.qty++:cart.push({name:n,price:p,qty:1});
render();
}

function render(){
let h='',t=0;
cart.forEach(i=>{
t+=i.price*i.qty;
h+=i.qty+' x '+i.name+'<br>';
});
document.getElementById('cart').innerHTML=h;
document.getElementById('total').innerText=t.toFixed(2)+'€';
}

function openCustomizer(n,p){
current={n,p};
removed=[];extras=[];
document.getElementById('title').innerText=n;

let html='';
pizzaData[n].forEach(i=>{
html+=`<span class="chip" onclick="toggleIngredient(this)">${i}</span>`;
});
document.getElementById('ingredients').innerHTML=html;

let ex=["Queso","Bacon","Pollo"];
let html2='';
ex.forEach(e=>{
html2+=`<span class="chip" onclick="toggleExtra(this)">${e}</span>`;
});
document.getElementById('extras').innerHTML=html2;

modal.style.display='flex';
}

function toggleIngredient(el){
el.classList.toggle('removed');
let v=el.innerText;
removed.includes(v)?removed=removed.filter(i=>i!=v):removed.push(v);
}

function toggleExtra(el){
el.classList.toggle('active');
let v=el.innerText;
extras.includes(v)?extras=extras.filter(i=>i!=v):extras.push(v);
}

function addCustom(){
let n=current.n;
if(removed.length)n+=' (sin '+removed.join(',')+')';
if(extras.length)n+=' + '+extras.join(',');
addToCart(n,current.p+extras.length);
closeModal();
}

function closeModal(){modal.style.display='none';}

function sendOrder(){
let msg='🍕 Pedido La Italiana %0A%0A';
cart.forEach(i=>msg+=i.qty+' x '+i.name+'%0A');
msg+='Total: '+document.getElementById('total').innerText;
window.open('https://wa.me/34621492566?text='+msg);
}
</script>

</body>
</html>
