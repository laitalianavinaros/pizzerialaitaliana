<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzería La Italiana</title>

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:#1f1814;
  color:#efe3d6;
}

/* 🔥 BOTONES SUPERIORES */
.quicknav{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  margin:30px 0;
  justify-content:center;
}

.quicknav .chip{
  flex:1 1 calc(25% - 14px);
  text-align:center;
  padding:14px 10px;
  border-radius:999px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:#efe3d6;
  font-weight:500;
  transition:.3s;
}

.quicknav .chip:hover{
  background:#d4b183;
  color:#1f1814;
  transform:scale(1.05);
}

@media (max-width:768px){
  .quicknav .chip{
    flex:1 1 calc(50% - 14px);
  }
}

/* 🔥 CARTA */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.item{
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.btn{
  margin-top:6px;
  padding:8px 12px;
  border:none;
  border-radius:999px;
  cursor:pointer;
}

.add{background:#d4b183;color:#000;}
.custom{border:1px solid #d4b183;background:transparent;color:#d4b183;}

/* 🛒 CARRITO */
#cartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4b183;
  padding:14px;
  border-radius:50%;
  cursor:pointer;
}

#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#2a201b;
  padding:20px;
  transition:.3s;
}

#cartPanel.open{right:0;}
</style>
</head>

<body>

<div class="container">

<!-- 🔥 BOTONES -->
<div class="quicknav">
  <a class="chip" href="#pizzas">Pizzas</a>
  <a class="chip" href="#entrantes">Entrantes</a>
  <a class="chip" href="#ensaladas">Ensaladas</a>
  <a class="chip" href="#postres">Postres</a>
</div>

<div id="menu"></div>

</div>

<!-- 🛒 -->
<div id="cartBtn" onclick="toggleCart()">🛒</div>

<div id="cartPanel">
<h3>Tu pedido</h3>
<div id="cartItems"></div>
<p>Total: <span id="cartTotal">0€</span></p>
<button onclick="sendOrder()">Enviar pedido</button>
</div>

<script>

/* 🔥 CARTA */
const MENU = {
"Pizzas":[
["Margarita",8.5],["Barbacoa",11.9],["Griega",14.5],
["Diavola (picante)",12],["Mexicana (picante)",11.9]
],
"Entrantes":[
["Patatas bravas",7.5],["Calamares",9]
],
"Ensaladas":[
["Caprese",9],["Mixta",8.5]
],
"Postres":[
["Tiramisú",5.5],["Tarta queso",5.5]
]
};

/* 🔥 GENERAR */
const menuDiv=document.getElementById("menu");

for(let cat in MENU){
  let html=`<h2 id="${cat.toLowerCase()}">${cat}</h2>`;
  MENU[cat].forEach(p=>{
    html+=`
    <div class="item">
      ${p[0]} · ${p[1]}€
      <br>
      <button class="btn add" onclick="addToCart('${p[0]}',${p[1]})">Añadir</button>
      ${cat==="Pizzas" ? `<button class="btn custom" onclick="addToCart('${p[0]} personalizada',${p[1]})">Personalizar</button>`:""}
    </div>`;
  });
  menuDiv.innerHTML+=html;
}

/* 🛒 */
let cart=[];
function addToCart(n,p){
  let f=cart.find(i=>i.name==n);
  f?f.qty++:cart.push({name:n,price:p,qty:1});
  render();
  toggleCart();
}

function render(){
  let h='',t=0;
  cart.forEach(i=>{
    t+=i.price*i.qty;
    h+=i.qty+' x '+i.name+'<br>';
  });
  cartItems.innerHTML=h;
  cartTotal.innerText=t.toFixed(2)+'€';
}

function toggleCart(){
  cartPanel.classList.toggle("open");
}

/* 📲 WHATSAPP */
function sendOrder(){
  let msg='Pedido:%0A';
  cart.forEach(i=>{
    msg+=i.qty+' x '+i.name+'%0A';
  });
  msg+='Total:'+cartTotal.innerText;
  window.open('https://wa.me/34621492566?text='+msg);
}

</script>

</body>
</html>
