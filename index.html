<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzería La Italiana Vinaròs</title>

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:#1f1814;
  color:#efe3d6;
}

.container{padding:20px;max-width:900px;margin:auto;}

h2{border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:8px;}

.item{
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.btn{
  margin-top:6px;
  padding:8px 12px;
  border:none;
  border-radius:999px;
  cursor:pointer;
}

.add{background:#d4b183;color:#000;}
.custom{border:1px solid #d4b183;background:transparent;color:#d4b183;}

#cartBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4b183;
  padding:14px;
  border-radius:50%;
  cursor:pointer;
}

#cartPanel{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#2a201b;
  padding:20px;
  transition:.3s;
}

#cartPanel.open{right:0;}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#2b211c;
  padding:20px;
  border-radius:20px;
}

.chip{
  display:inline-block;
  padding:6px 10px;
  border:1px solid #555;
  margin:4px;
  border-radius:999px;
  cursor:pointer;
}

.active{background:#d4b183;color:#000;}
.removed{background:#7a2b2b;text-decoration:line-through;}
</style>
</head>

<body>

<div class="container" id="menu"></div>

<div id="cartBtn" onclick="toggleCart()">🛒</div>

<div id="cartPanel">
<h3>🧾 Pedido</h3>
<div id="cartItems"></div>
<p>Total: <span id="cartTotal">0€</span></p>
<button onclick="sendOrder()">Enviar</button>
</div>

<div id="modal" class="modal">
<div class="modal-box">
<h3 id="pizzaTitle"></h3>
<div id="removeBox"></div>
<div id="extraBox"></div>
<button onclick="addCustom()">Añadir</button>
<button onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>

/* 🔥 TU CARTA COMPLETA (EDITABLE) */
const MENU = {
  pizzas:[
    ["Barbacoa",11.9],
    ["Diavola (picante)",12],
    ["Mexicana (picante)",11.9],
    ["Griega",14.5],
    ["Cuatro Quesos",10.7],
    ["Capriccio",10.7]
  ],
  entrantes:[
    ["Patatas bravas",7.5],
    ["Calamares",9],
    ["Huevos rotos",10.5]
  ],
  ensaladas:[
    ["Ensalada mixta",8.5],
    ["Ensalada caprese",9]
  ],
  postres:[
    ["Tiramisú",5.5],
    ["Tarta de queso",5.5],
    ["Tarta tres chocolates",5.5],
    ["Crep Nutella",5.5],
    ["Crep dulce de leche",5.5],
    ["Coulant chocolate",5.5]
  ]
};

/* 🔥 GENERAR CARTA */
const menuDiv=document.getElementById("menu");

for(let cat in MENU){
  let html=`<h2>${cat.toUpperCase()}</h2>`;
  MENU[cat].forEach(p=>{
    html+=`
    <div class="item">
      ${p[0]} · ${p[1]}€
      <br>
      <button class="btn add" onclick="addToCart('${p[0]}',${p[1]})">Añadir</button>
      ${cat==="pizzas" ? `<button class="btn custom" onclick="openModal('${p[0]}',${p[1]})">Personalizar</button>`:""}
    </div>`;
  });
  menuDiv.innerHTML+=html;
}

/* 🛒 CARRITO */
let cart=[];
function addToCart(n,p){
  let f=cart.find(i=>i.name==n);
  f?f.qty++:cart.push({name:n,price:p,qty:1});
  render();
  toggleCart();
}

function render(){
  let h='',t=0;
  cart.forEach(i=>{
    t+=i.price*i.qty;
    h+=i.qty+' x '+i.name+'<br>';
  });
  cartItems.innerHTML=h;
  cartTotal.innerText=t.toFixed(2)+'€';
}

function toggleCart(){
  cartPanel.classList.toggle("open");
}

/* 🍕 PERSONALIZAR */
let current=null;
function openModal(n,p){
  current={n,p};
  pizzaTitle.innerText=n;

  removeBox.innerHTML='';
  ["Tomate","Queso","Jamón"].forEach(i=>{
    removeBox.innerHTML+=`<span class="chip" onclick="this.classList.toggle('removed')">${i}</span>`;
  });

  extraBox.innerHTML='';
  ["Queso extra","Bacon","Pollo"].forEach(i=>{
    extraBox.innerHTML+=`<span class="chip" onclick="this.classList.toggle('active')">${i}</span>`;
  });

  modal.style.display='flex';
}

function addCustom(){
  addToCart(current.n,current.p);
  closeModal();
}

function closeModal(){
  modal.style.display='none';
}

/* 📲 WHATSAPP */
function sendOrder(){
  let msg='Pedido:%0A';
  cart.forEach(i=>{
    msg+=i.qty+' x '+i.name+'%0A';
  });
  msg+='Total:'+cartTotal.innerText;
  window.open('https://wa.me/34621492566?text='+msg);
}

</script>

</body>
</html>
